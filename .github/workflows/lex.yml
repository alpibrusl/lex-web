name: Lex CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lex-web
        uses: actions/checkout@v4

      - name: Install Lex toolchain
        run: |
          curl -fsSL https://github.com/alpibrusl/lex-lang/releases/download/v0.9.3/lex-v0.9.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Verify lex version
        run: lex --version

      - name: Install package dependencies
        run: lex pkg install

      - name: Type-check
        run: lex check src/web.lex

      - name: Run tests
        run: lex test
