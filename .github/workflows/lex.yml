name: Lex CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lex-web
        uses: actions/checkout@v4

      - name: Install Lex toolchain
        run: |
          curl -fsSL https://github.com/alpibrusl/lex-lang/releases/download/v0.9.3/lex-v0.9.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /tmp/
          echo "/tmp/lex-v0.9.3-x86_64-unknown-linux-gnu" >> $GITHUB_PATH

      # Pre-populate the lex package cache so `lex check` can resolve
      # `import "lex-schema/..."` and `import "lex-crypto/..."` without
      # running `lex pkg install`.
      - name: Fetch package dependencies
        run: |
          mkdir -p ~/.lex/packages
          git clone --depth=1 https://github.com/alpibrusl/lex-schema ~/.lex/packages/lex-schema
          git clone --depth=1 https://github.com/alpibrusl/lex-crypto ~/.lex/packages/lex-crypto

      - name: Type-check
        run: lex check src/web.lex

      - name: Run tests
        run: lex test
