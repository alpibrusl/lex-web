[package]
name    = "lex-web"
version = "0.3.0"
lex     = "0.9.5"

# 0.9.5: net.serve_ws_fn_actor (per-connection bridge actor for
#        outbound sends — closes #4), std.net.serve_routed,
#        parametric record-alias fix (#439), dispatch-loop superinst
#        fusion (+27% on straight_arith).
# 0.9.4: conc.spawn/ask/tell synchronous actor model, named-actor
#        registry (conc.register/lookup/unregister), serve_ws_fn_auth.
# 0.9.3: net.dial_ws (outbound WS client), hyper 1.x server (5-8× throughput),
#        permissive-policy fix unblocking [sql]/[random] in lex test.
# 0.9.2: std.crypto (blake2b, random_str_hex, AEAD, KDF), std.time extensions
#        (now_str, now_ms, mono_ns), streaming ResponseBody, iter.unfold.
[dependencies]
lex-schema = { git = "https://github.com/alpibrusl/lex-schema" }
lex-crypto = { git = "https://github.com/alpibrusl/lex-crypto" }
lex-orm    = { git = "https://github.com/alpibrusl/lex-orm" }
