[package]
name    = "lex-web"
version = "0.3.0"

# Requires lex-lang 0.9.2+ for std.crypto (blake2b, random_str_hex, AEAD,
# KDF), std.time extensions (now_str, now_ms, mono_ns), streaming
# ResponseBody, and iter.unfold. 0.9.1 is the minimum for the `lex test`
# runner and `lex fmt`.
[dependencies]
lex-schema = { path = "../lex-schema" }
